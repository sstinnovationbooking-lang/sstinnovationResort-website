name: Deploy Vercel (Production)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-prod-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Validate required Vercel secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${VERCEL_TOKEN:-}" || (echo "::error::Missing secret: VERCEL_TOKEN" && exit 1)
          test -n "${VERCEL_ORG_ID:-}" || (echo "::error::Missing secret: VERCEL_ORG_ID" && exit 1)
          test -n "${VERCEL_PROJECT_ID:-}" || (echo "::error::Missing secret: VERCEL_PROJECT_ID" && exit 1)

          # Prevent using VERCEL_OIDC_TOKEN as VERCEL_TOKEN.
          if echo "$VERCEL_TOKEN" | grep -Eq '^eyJ[A-Za-z0-9_-]*\.'; then
            echo "::error::VERCEL_TOKEN looks like a JWT (likely VERCEL_OIDC_TOKEN)."
            echo "::error::Use a Vercel Personal Token from vercel.com/account/tokens for GitHub secret VERCEL_TOKEN."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Pull Vercel project settings
        run: npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build project artifacts
        run: npx vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel production
        run: npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
