name: Platform E2E Smoke

on:
  workflow_run:
    workflows:
      - Deploy Vercel (Production)
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: platform-e2e-smoke
  cancel-in-progress: true

jobs:
  smoke:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Run platform E2E smoke
        env:
          WEBSITE_BASE_URL: https://sstinnovationresort-website.vercel.app
          OWNER_BACKEND_BASE_URL: https://sstinnovation-backend-owner.vercel.app
          CENTRAL_BACKEND_BASE_URL: https://sstinnovation-backend-central.vercel.app
          BACKEND_API_SECRET: ${{ secrets.BACKEND_API_SECRET }}
          E2E_TENANT_A: demo-resort
          E2E_TENANT_B: forest-escape
          E2E_TENANT_404: tenant-not-found
        run: npm run smoke:platform-e2e

